name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build + unit tests on every supported platform. This is the real gate:
  # goblin's ELF/PE/Mach-O section finders and the per-OS memory reader all
  # differ by target, so a green build on one OS says nothing about the others.
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      # `cargo test` currently runs only unit tests + any integration test that
      # needs no live target. The live gc-stats harness (docs/tests-harness-plan.md)
      # is #[ignore]-gated and machine-specific, so it is skipped here — a stock
      # runner has neither the custom CPython builds nor (necessarily) the
      # process-attach privileges those tests require.
      - name: Test
        run: cargo test --verbose

      # Lint + format are reported but NON-BLOCKING for now: the tree carries a
      # known clippy-warning baseline and is not yet rustfmt-clean, so denying
      # would red every build. Flip `continue-on-error` to false (and drop the
      # `|| true` intent) once the baseline is cleaned.
      - name: Clippy (non-blocking)
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check (non-blocking)
        continue-on-error: true
        run: cargo fmt --all --check

  # End-to-end proof the attach + version-detect + decode pipeline works against
  # a REAL interpreter, one leg per Python minor 3.8 → 3.15 (all that setup-python
  # ships; 3.15 is beta-only, 3.16 does not exist yet). This exercises both finding
  # paths (symbol/cross-reference for 3.8–3.12, "xdebugpy" cookie for 3.13+), the
  # 3.8 global-GC branch, and both decode kinds (InlineArray ≤3.14, RingBuffer 3.15).
  #
  # NON-BLOCKING (continue-on-error) until the first real run confirms the two
  # things that can't be verified from a dev box: (a) runner ptrace permissions,
  # and (b) that setup-python's build keeps `_PyRuntime`/`Py_Version` resolvable
  # (dynsym for pre-3.13) and ships the PyRuntime cookie section (3.13+). A leg
  # that can't resolve the symbol goes yellow and pinpoints exactly which version
  # to fix, without reddening the build.
  live-smoke:
    name: gc-stats smoke (py${{ matrix.python }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        # 3.16 omitted: not in the setup-python registry (unreleased — 3.15 is
        # still beta). It needs a self-built runner artifact; out of scope here.
        python: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14', '3.15']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          # Harmless for stable minors (they still resolve to their latest stable);
          # required for 3.15, which only exists as a beta in the registry.
          allow-prereleases: true

      - name: Build gcscope
        run: cargo build --verbose

      # Same-uid, non-descendant attach needs a permissive ptrace scope. Linux-only
      # by nature (Windows/macOS gate attach differently), and guarded by `runner.os`
      # so adding OS legs to this matrix stays a one-line change.
      - name: Allow ptrace (best-effort)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      # The whole driver lives in tests/live_smoke.py, not in this step: the same
      # command has to run on Windows/PowerShell and macOS, and it must be
      # reproducible by hand off CI. Keep this step a single invocation.
      - name: Attach, detect version, assert non-empty GC stats
        run: python tests/live_smoke.py --label py${{ matrix.python }}
