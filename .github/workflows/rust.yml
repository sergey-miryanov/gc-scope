name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.97.1 (master)
        with:
          toolchain: stable
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov  # pinned action SHA; the `tool` input selects what to install

      - name: Build
        run: cargo build --verbose

      # Unit tests only; live-smoke below is the integration gate.
      - name: Test
        run: cargo test --verbose

      # Separate instrumented run so a coverage-tool failure isn't mistaken for a test
      # failure and the gate keeps running an uninstrumented binary. Non-blocking.
      - name: Coverage (unit tests)
        continue-on-error: true
        uses: ./.github/actions/coverage-report
        with:
          test-cmd: cargo test --quiet
          flags: unit,${{ matrix.os }}
          name: unit-${{ matrix.os }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

      # Non-blocking until the existing warning/format baseline is cleaned up.
      - name: Clippy (non-blocking)
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check (non-blocking)
        continue-on-error: true
        run: cargo fmt --all --check

  # Attach to a real interpreter and decode its GC stats, per (OS, Python minor). Covers
  # both finding paths across all three binary parsers. See ADR 0004 for the full cross-product.
  live-smoke:
    name: gc-stats smoke (${{ matrix.os }} py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 3.16 omitted (not in the setup-python registry yet). 3.15t is the one
        # free-threaded leg — the only build reaching the 1/1/1 ring geometry.
        # 3.15 is left FLOATING: setup-python picks the newest pre-release and gcscope
        # refuses one it has no exact layout for, so these legs go red when a new beta/rc
        # ships. Don't fix a red 3.15 by pinning — regenerate offsets and register.
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14', '3.15', '3.15t']
        # macOS: 3.13+ attaches unprivileged (PEP 768 get-task-allow); 3.8-3.12 needs root.
        # Flagged per-version because GitHub expressions can't compare versions.
        include:
          - { python: '3.8',  macos_needs_root: 'yes' }
          - { python: '3.9',  macos_needs_root: 'yes' }
          - { python: '3.10', macos_needs_root: 'yes' }
          - { python: '3.11', macos_needs_root: 'yes' }
          - { python: '3.12', macos_needs_root: 'yes' }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.97.1 (master)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python }}
          # Required for the beta-only 3.15.
          allow-prereleases: true

      - name: Build gcscope
        run: cargo build --verbose

      - name: Allow ptrace (best-effort)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      # macOS gates attach behind task_for_pid. Non-blocking so it can't mask a code failure.
      - name: Configure macOS taskport permissions
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          id $(whoami)
          sudo security authorizationdb write system.privilege.taskport is-developer
          sudo security authorizationdb read system.privilege.taskport

      # Dump image facts so a macOS failure is diagnosable without another CI round-trip.
      - name: Describe the macOS Python image
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          PYBIN="$(python -c 'import sys; print(sys.executable)')"
          # The executable is a stub; the runtime lives in the framework dylib.
          FW="$(python -c 'import sysconfig,os; print(os.path.join(sysconfig.get_config_var("prefix"), "Python"))')"
          for f in "$PYBIN" "$FW"; do
            echo "===== $f ====="
            [ -e "$f" ] || { echo "(absent)"; continue; }
            file "$f"
            otool -l "$f" 2>/dev/null | grep -B2 -A4 'PyRuntime' || echo "(no PyRuntime section)"
            nm -m "$f" 2>/dev/null | grep -i 'pyruntime\|py_version' || echo "(no matching symbols)"
            codesign -dv --entitlements - "$f" 2>&1 | grep -i 'flags\|runtime\|get-task-allow' \
              || echo "(unsigned / no signing info)"
          done

      # Unprivileged where it works, so a target that drops get-task-allow fails here
      # instead of being masked by blanket sudo. test_python() picks up setup-python's
      # interpreter from PATH; the command works in bash and pwsh (Windows).
      - name: Attach, detect version, assert GC-stats shape
        if: runner.os != 'macOS' || matrix.macos_needs_root != 'yes'
        run: cargo test --test live_smoke -- --ignored --nocapture

      # macOS pre-3.13 needs root to attach. cargo/rustup live in the user's HOME, not root's,
      # so build the test binary unprivileged, then run it under sudo -E (which carries
      # GCSCOPE_TEST_PYTHON through; sudo resets PATH, hence the explicit path).
      - name: Attach, detect version, assert GC-stats shape (sudo)
        if: runner.os == 'macOS' && matrix.macos_needs_root == 'yes'
        run: |
          export GCSCOPE_TEST_PYTHON="$(command -v python)"
          BIN=$(cargo test --test live_smoke --no-run --message-format=json \
                | jq -r 'select(.executable != null and .target.name == "live_smoke") | .executable' \
                | head -1)
          echo "test binary: $BIN"
          sudo -E "$BIN" --ignored --nocapture

  # Build custom interpreters setup-python can't supply, then run the live_smoke driver.
  # Linux-only (version/decode coverage is OS-independent). Blocking gate. Rationale:
  # docs/adr/0006-layout-registration-integrity.md.
  #   - 3.15+inc: shares hex 0x030f00b1 with clean 3.15.0b1; --expect-extended proves the
  #     +inc candidate (not the clean one) was decoded.
  #   - 3.16.0a0: pinned commit read from the gcscope-source: line in v_3_16_0a0.rs, so
  #     regenerating 3.16 moves the pin with no YAML edit.
  custom-build-smoke:
    name: gc-stats smoke (source ${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ref: branch/SHA to build. provenance_file: read the pin from a layout's
          # gcscope-source: line instead (leave ref empty).
          - label: '3.15+inc'
            repo: sergey-miryanov/cpython
            ref: 'feat/gc-gen-3.15+inc'
            provenance_file: ''
            expect_extended: 'yes'
          - label: '3.16.0a0'
            repo: python/cpython
            ref: ''
            provenance_file: 'src/remote_debugging/offsets/v_3_16_0a0.rs'
            expect_extended: 'no'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.97.1 (master)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Resolve to an exact commit (empty ref → read the pin from provenance_file). The
      # cache key is that commit, so a moving branch re-keys and a pinned SHA stays a hit.
      - name: Resolve interpreter commit
        id: rev
        run: |
          REF="${{ matrix.ref }}"
          if [ -z "$REF" ]; then
            REF=$(grep -oE 'gcscope-source: [^@]+@[0-9a-f]{40}' "${{ matrix.provenance_file }}" \
                  | head -1 | grep -oE '[0-9a-f]{40}')
            [ -z "$REF" ] && { echo "::error::no gcscope-source pin in ${{ matrix.provenance_file }}"; exit 1; }
            echo "Pinned from ${{ matrix.provenance_file }}: $REF"
          fi
          SHA=$(git ls-remote "https://github.com/${{ matrix.repo }}" "$REF" | cut -f1)
          [ -z "$SHA" ] && SHA="$REF"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Building ${{ matrix.label }} @ $SHA"

      - name: Cache built interpreter
        id: cache-py
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/cpython-build
          key: cpython-${{ matrix.label }}-${{ steps.rev.outputs.sha }}

      # Fetch the resolved SHA (branch or pinned commit both work). Only C build deps
      # needed; spin.py imports gc/os/sys/time only.
      - name: Build CPython from source
        if: steps.cache-py.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev libffi-dev
          git init src && cd src
          git remote add origin "https://github.com/${{ matrix.repo }}"
          git fetch --depth 1 origin "${{ steps.rev.outputs.sha }}"
          git checkout FETCH_HEAD
          ./configure --prefix="$HOME/cpython-build"
          make -j"$(nproc)"
          make install

      - name: Build gcscope
        run: cargo build --verbose

      - name: Allow ptrace (best-effort)
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      # GCSCOPE_TEST_PYTHON points the test at the source-built interpreter; the +inc leg
      # additionally requires the extended GC columns via GCSCOPE_EXPECT_EXTENDED.
      - name: Attach, detect version, assert GC-stats shape
        run: |
          PY="$HOME/cpython-build/bin/python3"
          "$PY" --version
          export GCSCOPE_TEST_PYTHON="$PY"
          [ "${{ matrix.expect_extended }}" = "yes" ] && export GCSCOPE_EXPECT_EXTENDED=1
          cargo test --test live_smoke -- --ignored --nocapture

  # The integration suites (lifecycle, memory, monitor, remote_debugging, diagram) are
  # #[ignore]d because they attach to a live interpreter; this leg grants attach
  # permission and runs them all. --features test-hooks is required by tests/monitor.rs
  # and a no-op elsewhere. Linux/py3.13. Blocking gate.
  integration-tests:
    name: integration tests (attach)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.97.1 (master)
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov  # pinned action SHA; the `tool` input selects what to install
      # Guarantees an interpreter, so the tests run rather than skip (a false green).
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Allow ptrace (best-effort)
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      # Blocking gate, uninstrumented (ADR 0005: assert against a clean binary). This now also
      # runs the live-smoke shape test (tests/live_smoke.rs) on Linux/py3.13, since it joined
      # the --tests set; the full OS × version matrix runs it in the live-smoke job.
      - name: "Run the 'ignored' integration tests"
        run: cargo test --features test-hooks --tests -- --ignored

      # Separate instrumented re-run so the integration suites' live-attach code
      # paths (find_runtime, read_offsets, session reads, collect/render, the monitor
      # retry) are measured — the unit-coverage leg never runs the #[ignore]d tests.
      # Non-blocking so a coverage-tool failure can't fail the gate above.
      - name: Coverage (integration tests)
        continue-on-error: true
        uses: ./.github/actions/coverage-report
        with:
          test-cmd: cargo test --features test-hooks --tests -- --ignored
          flags: integration,ubuntu-latest
          name: integration-ubuntu-latest
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  # Coverage-only sibling of live-smoke — every step is non-blocking; live-smoke is the gate,
  # not this. Enough legs (3.8/3.12/3.15 × 3 OS) to reach each decode path. cargo-llvm-cov runs
  # the live_smoke test target natively and captures the gcscope binary it spawns; Codecov
  # normalizes the absolute paths so the per-OS uploads merge.
  coverage-smoke:
    name: coverage smoke (${{ matrix.os }} py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    # Job-level: an instrumented-build/tool failure can't block a merge. This masks the
    # job's API `conclusion` — judge by whether a report reached Codecov, not GitHub status.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.8', '3.12', '3.15']
        include:
          - { python: '3.8',  macos_needs_root: 'yes' }
          - { python: '3.12', macos_needs_root: 'yes' }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 1.97.1 (master)
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov  # pinned action SHA; the `tool` input selects what to install
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Allow ptrace (best-effort)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      - name: Configure macOS taskport permissions
        if: runner.os == 'macOS'
        continue-on-error: true
        run: sudo security authorizationdb write system.privilege.taskport is-developer

      # Unprivileged legs: one native invocation builds the instrumented test + gcscope binary,
      # runs the shape test (which attaches), and captures the spawned binary's coverage.
      - name: Coverage (unprivileged)
        if: runner.os != 'macOS' || matrix.macos_needs_root != 'yes'
        continue-on-error: true
        shell: bash
        run: cargo llvm-cov --test live_smoke --lcov --output-path lcov.info -- --ignored

      # macOS pre-3.13 needs root to attach: instrument via show-env, build the test binary
      # unprivileged, run it under sudo -E (LLVM_PROFILE_FILE + GCSCOPE_TEST_PYTHON carried
      # through), make the root-written profiles readable, then report.
      - name: Coverage (sudo)
        if: runner.os == 'macOS' && matrix.macos_needs_root == 'yes'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          source <(cargo llvm-cov show-env --export-prefix)
          cargo llvm-cov clean --workspace
          export GCSCOPE_TEST_PYTHON="$(command -v python)"
          BIN=$(cargo test --test live_smoke --no-run --message-format=json \
                | jq -r 'select(.executable != null and .target.name == "live_smoke") | .executable' \
                | head -1)
          echo "test binary: $BIN"
          sudo -E "$BIN" --ignored --nocapture
          sudo chown -R "$(whoami)" "$CARGO_LLVM_COV_TARGET_DIR" || true
          cargo llvm-cov report --lcov --output-path lcov.info
          echo "lcov source files: $(grep -c '^SF:' lcov.info || echo 0)"

      - name: Upload coverage
        continue-on-error: true
        uses: ./.github/actions/coverage-report
        with:
          flags: smoke,${{ matrix.os }}
          name: smoke-${{ matrix.os }}-py${{ matrix.python }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
