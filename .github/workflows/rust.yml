name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@grcov

      - name: Build
        run: cargo build --verbose

      # Unit tests only; live-smoke below is the integration gate.
      - name: Test
        run: cargo test --verbose

      # A second, instrumented run rather than replacing `Test` above: that keeps a
      # coverage-tool failure from ever being mistaken for a test failure, and keeps
      # the gate itself running an uninstrumented binary. RUSTFLAGS is scoped to this
      # step so it cannot leak into the steps above.
      - name: Coverage (unit tests)
        continue-on-error: true
        shell: bash
        env:
          RUSTFLAGS: -Cinstrument-coverage
          LLVM_PROFILE_FILE: ${{ github.workspace }}/target/profraw/gcscope-%p-%m.profraw
        run: |
          cargo test --quiet
          grcov target/profraw \
            --binary-path target/debug \
            -s . -t lcov --branch --ignore-not-existing \
            --ignore '../*' --ignore '/*' --ignore 'C:/Users/*' \
            -o lcov.info
          echo "lcov source files: $(grep -c '^SF:' lcov.info || echo 0)"

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: unit,${{ matrix.os }}
          name: unit-${{ matrix.os }}
          # Explicit path; searching the tree would also pick up stale local reports.
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # Non-blocking until the existing warning/format baseline is cleaned up.
      - name: Clippy (non-blocking)
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check (non-blocking)
        continue-on-error: true
        run: cargo fmt --all --check

  # Attach to a real interpreter and decode its GC stats, per (OS, Python minor).
  # Covers both finding paths (symbol lookup ≤3.12, "xdebugpy" cookie 3.13+) across
  # all three binary parsers. Rationale for the full cross-product, and the
  # platform defects it found, are in docs/adr/0004-per-platform-image-layout.md.
  live-smoke:
    name: gc-stats smoke (${{ matrix.os }} py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 3.16 omitted: not in the setup-python registry yet.
        # 3.15t is the one free-threaded leg: it is the only build that reaches the
        # free-threaded ring geometry (1/1/1 slots per generation instead of 11/3/3),
        # which every GIL leg leaves unexercised. The other `t` variants would add no
        # new path — below 3.15 the layout is inline, where the GIL flag is irrelevant.
        #
        # `3.15` is left FLOATING, not pinned to a beta, on purpose. setup-python
        # resolves it to the newest pre-release, and gcscope refuses to decode a
        # pre-release it has no exact layout for (`_Py_DebugOffsets` is only ABI-frozen
        # across patch releases — 3.15.0b4 inserted a field into `_thread_state` and
        # shifted everything after it). So these legs go red when CPython ships the next
        # beta/rc, which is the intended early warning that a new layout needs
        # generating. Do not "fix" a red 3.15 leg by pinning the version — run
        # scripts/gen-offsets.py against that build and register it.
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14', '3.15', '3.15t']
        # macOS only: 3.13+ ships com.apple.security.get-task-allow (PEP 768) so it
        # attaches unprivileged; 3.8-3.12 does not and needs root. Flagged per
        # version here because GitHub expressions cannot compare versions.
        include:
          - { python: '3.8',  macos_needs_root: 'yes' }
          - { python: '3.9',  macos_needs_root: 'yes' }
          - { python: '3.10', macos_needs_root: 'yes' }
          - { python: '3.11', macos_needs_root: 'yes' }
          - { python: '3.12', macos_needs_root: 'yes' }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          # Required for 3.15, which is beta-only; no effect on stable minors.
          allow-prereleases: true

      - name: Build gcscope
        run: cargo build --verbose

      - name: Allow ptrace (best-effort)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      # macOS gates attach behind task_for_pid. Non-blocking so a failure here
      # cannot skip the steps below and hide their result.
      - name: Configure macOS taskport permissions
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          id $(whoami)
          sudo security authorizationdb write system.privilege.taskport is-developer
          sudo security authorizationdb read system.privilege.taskport

      # Dumps image facts (fat slices, PyRuntime section, symbol spelling, code
      # signature) so a macOS failure is diagnosable without another CI round-trip.
      - name: Describe the macOS Python image
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          PYBIN="$(python -c 'import sys; print(sys.executable)')"
          # The executable is a stub; the runtime lives in the framework dylib.
          FW="$(python -c 'import sysconfig,os; print(os.path.join(sysconfig.get_config_var("prefix"), "Python"))')"
          for f in "$PYBIN" "$FW"; do
            echo "===== $f ====="
            [ -e "$f" ] || { echo "(absent)"; continue; }
            file "$f"
            otool -l "$f" 2>/dev/null | grep -B2 -A4 'PyRuntime' || echo "(no PyRuntime section)"
            nm -m "$f" 2>/dev/null | grep -i 'pyruntime\|py_version' || echo "(no matching symbols)"
            codesign -dv --entitlements - "$f" 2>&1 | grep -i 'flags\|runtime\|get-task-allow' \
              || echo "(unsigned / no signing info)"
          done

      # Kept unprivileged where it works, so a target that stops shipping
      # get-task-allow fails here instead of being masked by blanket sudo.
      - name: Attach, detect version, assert non-empty GC stats
        if: runner.os != 'macOS' || matrix.macos_needs_root != 'yes'
        run: python tests/live_smoke.py --label ${{ matrix.os }}-py${{ matrix.python }}

      - name: Attach, detect version, assert non-empty GC stats (sudo)
        if: runner.os == 'macOS' && matrix.macos_needs_root == 'yes'
        run: |
          PY="$(command -v python)"
          sudo -E "$PY" tests/live_smoke.py \
            --label ${{ matrix.os }}-py${{ matrix.python }}

  # Interpreters setup-python cannot supply: build CPython from source, then run the
  # SAME live_smoke driver. Linux-only on purpose -- these legs add version/decode
  # coverage (same-hex candidate selection, an unreleased layout), which is
  # OS-independent; the per-OS *finding* paths are already exercised by the stock
  # live-smoke matrix above. A blocking gate, like live-smoke.
  #
  #   - 3.15+inc: sergey-miryanov/cpython@feat/gc-gen-3.15+inc. Shares hex 0x030f00b1
  #     with clean 3.15.0b1 and is told apart only by generation_stats_size, so it is
  #     the one live check of the +inc candidate selector. --expect-extended asserts
  #     the IncrSize/AliveSize columns that prove the +inc candidate (not the clean
  #     one) was decoded; a wrong pick already hard-errors on the ring-size mismatch.
  #   - 3.16.0a0: python/cpython pinned to an exact commit, but the SHA is NOT written
  #     here -- it is read from the `gcscope-source:` provenance line that
  #     scripts/gen-offsets.py stamps into v_3_16_0a0.rs. That layout file is the single
  #     source of truth: regenerate the 3.16 offsets and the pin moves with them, no YAML
  #     edit. Pinned rather than floating `main` so unrelated CPython drift cannot block
  #     PRs; retire this leg for a stock setup-python row once 3.16.0a1 reaches the registry.
  custom-build-smoke:
    name: gc-stats smoke (source ${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ref: a branch/SHA to build directly. provenance_file: read the pinned commit
          # from a generated layout's `gcscope-source:` line instead (leave ref empty).
          - label: '3.15+inc'
            repo: sergey-miryanov/cpython
            ref: 'feat/gc-gen-3.15+inc'
            provenance_file: ''
            expect_extended: 'yes'
          - label: '3.16.0a0'
            repo: python/cpython
            ref: ''
            provenance_file: 'src/remote_debugging/offsets/v_3_16_0a0.rs'
            expect_extended: 'no'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Resolve to an exact commit. An empty `ref` means "read the pin from the layout
      # file's gcscope-source: line" (single source of truth for an ongoing version).
      # Cache key = exact commit, so a moving branch (+inc) re-keys when it advances while
      # a pinned SHA stays a permanent hit. ls-remote yields nothing for a raw SHA, so
      # fall back to the ref itself.
      - name: Resolve interpreter commit
        id: rev
        run: |
          REF="${{ matrix.ref }}"
          if [ -z "$REF" ]; then
            REF=$(grep -oE 'gcscope-source: [^@]+@[0-9a-f]{40}' "${{ matrix.provenance_file }}" \
                  | head -1 | grep -oE '[0-9a-f]{40}')
            [ -z "$REF" ] && { echo "::error::no gcscope-source pin in ${{ matrix.provenance_file }}"; exit 1; }
            echo "Pinned from ${{ matrix.provenance_file }}: $REF"
          fi
          SHA=$(git ls-remote "https://github.com/${{ matrix.repo }}" "$REF" | cut -f1)
          [ -z "$SHA" ] && SHA="$REF"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Building ${{ matrix.label }} @ $SHA"

      - name: Cache built interpreter
        id: cache-py
        uses: actions/cache@v4
        with:
          path: ~/cpython-build
          key: cpython-${{ matrix.label }}-${{ steps.rev.outputs.sha }}

      # Fetch by resolved SHA (works for both a branch and a pinned commit; GitHub
      # allows fetching an arbitrary reachable SHA). Only the C build deps are needed --
      # spin.py imports gc/os/sys/time only, so the optional stdlib C modules are
      # irrelevant and the interpreter boots without libssl/libffi at runtime.
      - name: Build CPython from source
        if: steps.cache-py.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev zlib1g-dev libffi-dev
          git init src && cd src
          git remote add origin "https://github.com/${{ matrix.repo }}"
          git fetch --depth 1 origin "${{ steps.rev.outputs.sha }}"
          git checkout FETCH_HEAD
          ./configure --prefix="$HOME/cpython-build"
          make -j"$(nproc)"
          make install

      - name: Build gcscope
        run: cargo build --verbose

      - name: Allow ptrace (best-effort)
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      - name: Attach, detect version, assert GC stats
        run: |
          PY="$HOME/cpython-build/bin/python3"
          "$PY" --version
          EXTRA=""
          [ "${{ matrix.expect_extended }}" = "yes" ] && EXTRA="--expect-extended"
          python3 tests/live_smoke.py --python "$PY" --label "${{ matrix.label }}" $EXTRA

  # grcov (not cargo-llvm-cov) in both coverage paths on purpose: with `-s .` it
  # emits repo-relative, forward-slash paths on every OS, so the Windows uploads
  # merge with the Linux/macOS ones instead of appearing as a second set of files.
  # `cargo llvm-cov --lcov` emits absolute native paths (`SF:X:\Work\...`), which
  # Codecov may or may not normalize — and when it doesn't, coverage silently
  # double-counts rather than erroring.
  #
  # Coverage-only sibling of live-smoke, kept separate on purpose: the gate above
  # must keep asserting against an UNINSTRUMENTED binary (what actually ships), and
  # coverage needs only enough legs to reach each decode path, not all 24. The three
  # versions cover every GcStatsKind route — 3.8 global GC, 3.12 legacy per-interp,
  # 3.15 ring buffer — across all three binary formats.
  # Every step is non-blocking: live-smoke is the gate, this job never is.
  coverage-smoke:
    name: coverage smoke (${{ matrix.os }} py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    # Job-level, so an instrumented-build or tool-install failure cannot block a
    # merge either. Note this masks the job's `conclusion` in the API — judge these
    # legs by whether a report reached Codecov, not by their GitHub status.
    continue-on-error: true
    env:
      # live_smoke.py drives gcscope as a subprocess, so coverage has to come from
      # the process itself rather than a test harness. Each invocation drops its own
      # profile (%p = pid, %m = binary signature).
      RUSTFLAGS: -Cinstrument-coverage
      LLVM_PROFILE_FILE: ${{ github.workspace }}/target/profraw/gcscope-%p-%m.profraw
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.8', '3.12', '3.15']
        include:
          - { python: '3.8',  macos_needs_root: 'yes' }
          - { python: '3.12', macos_needs_root: 'yes' }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@grcov
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      # No rust-cache here: RUSTFLAGS forces a full instrumented rebuild anyway.
      - name: Build instrumented gcscope
        run: cargo build

      - name: Allow ptrace (best-effort)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      - name: Configure macOS taskport permissions
        if: runner.os == 'macOS'
        continue-on-error: true
        run: sudo security authorizationdb write system.privilege.taskport is-developer

      - name: Smoke run
        if: runner.os != 'macOS' || matrix.macos_needs_root != 'yes'
        continue-on-error: true
        run: python tests/live_smoke.py --label cov-${{ matrix.os }}-py${{ matrix.python }}

      - name: Smoke run (sudo)
        if: runner.os == 'macOS' && matrix.macos_needs_root == 'yes'
        continue-on-error: true
        run: |
          PY="$(command -v python)"
          sudo -E "$PY" tests/live_smoke.py \
            --label cov-${{ matrix.os }}-py${{ matrix.python }}

      # The sudo legs write root-owned .profraw that grcov then cannot read.
      - name: Make profiles readable
        if: runner.os == 'macOS' && matrix.macos_needs_root == 'yes'
        continue-on-error: true
        run: sudo chown -R "$(whoami)" target/profraw || true

      - name: Generate lcov
        continue-on-error: true
        shell: bash
        run: |
          # RUSTFLAGS instruments dependencies too; --ignore drops registry sources
          # so only this crate's files reach the report.
          grcov target/profraw \
            --binary-path target/debug \
            -s . -t lcov --branch --ignore-not-existing \
            --ignore '../*' --ignore '/*' --ignore 'C:/Users/*' \
            -o lcov.info
          echo "lcov source files: $(grep -c '^SF:' lcov.info || echo 0)"

      - name: Upload coverage to Codecov
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: smoke,${{ matrix.os }}
          name: smoke-${{ matrix.os }}-py${{ matrix.python }}
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
