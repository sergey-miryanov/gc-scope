name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build + unit tests on every supported platform. This is the real gate:
  # goblin's ELF/PE/Mach-O section finders and the per-OS memory reader all
  # differ by target, so a green build on one OS says nothing about the others.
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      # `cargo test` currently runs only unit tests + any integration test that
      # needs no live target. The live gc-stats harness (docs/tests-harness-plan.md)
      # is #[ignore]-gated and machine-specific, so it is skipped here — a stock
      # runner has neither the custom CPython builds nor (necessarily) the
      # process-attach privileges those tests require.
      - name: Test
        run: cargo test --verbose

      # Lint + format are reported but NON-BLOCKING for now: the tree carries a
      # known clippy-warning baseline and is not yet rustfmt-clean, so denying
      # would red every build. Flip `continue-on-error` to false (and drop the
      # `|| true` intent) once the baseline is cleaned.
      - name: Clippy (non-blocking)
        continue-on-error: true
        run: cargo clippy --all-targets -- -D warnings

      - name: Format check (non-blocking)
        continue-on-error: true
        run: cargo fmt --all --check

  # End-to-end proof the attach + version-detect + decode pipeline works against a
  # REAL interpreter, on every (OS, Python minor) pair setup-python ships. Covers
  # both finding paths (symbol lookup for 3.8–3.12, "xdebugpy" cookie for 3.13+)
  # against all three binary parsers (ELF/PE/Mach-O), the 3.8 global-GC branch,
  # and both decode kinds (InlineArray ≤3.14, RingBuffer 3.15).
  #
  # BLOCKING as of 2026-07-20, with all 24 legs green. It earned that: on its first
  # runs it found five real defects that unit tests could not have (see ADR 0004) —
  # the ELF section being named ".PyRuntime", macOS universal binaries, fat slices
  # needing standalone parsing, Mach-O symbol decoration, and the macOS image base
  # not being the lowest mapping. Every one of them was platform-specific and
  # invisible from the development machine.
  live-smoke:
    name: gc-stats smoke (${{ matrix.os }} py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Full cross-product, deliberately. A sparse "one leg either side of 3.13
      # per OS" sample would cover the obvious per-OS forks (find_section_in_*,
      # resolve_symbol_*), but it assumes those are the ONLY things that vary by
      # (os, version) — and module *packaging* varies too: whether libpython is a
      # separate .so/.dll/.dylib or linked into the executable, and how it is
      # named, differs by version within a platform. Module enumeration is exactly
      # what the finder depends on, so that assumption is not safe to make.
      #
      # Cost is not a reason to sample here: the repo is public, so Actions
      # minutes are free and macOS carries no billing multiplier.
      #
      # Note the OS legs also cover different *patch* releases — setup-python
      # resolves a minor to the newest patch built for that platform, e.g. '3.12'
      # is 3.12.13 on Linux but 3.12.10 on Windows/macOS. That is free extra
      # coverage, and a reason a version can behave differently per OS.
      matrix:
        # 3.16 omitted: not in the setup-python registry (unreleased — 3.15 is
        # still beta). It needs a self-built runner artifact; out of scope here.
        # Every minor below is available on all three platforms.
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14', '3.15']
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          # Harmless for stable minors (they still resolve to their latest stable);
          # required for 3.15, which only exists as a beta in the registry.
          allow-prereleases: true

      - name: Build gcscope
        run: cargo build --verbose

      # Same-uid, non-descendant attach needs a permissive ptrace scope. Linux-only
      # by nature (Windows/macOS gate attach differently), and guarded by `runner.os`
      # so adding OS legs to this matrix stays a one-line change.
      - name: Allow ptrace (best-effort)
        if: runner.os == 'Linux'
        run: sudo sysctl -w kernel.yama.ptrace_scope=0 || true

      # macOS gates attach through task_for_pid rather than ptrace scope.
      # Non-blocking so a failure here can never skip the steps below and hide
      # their result.
      #
      # `is-developer` grants taskport only to members of the `_developer` group, so
      # it is a no-op if the runner user is not in it — which is why the earlier
      # unprivileged attempts may have been testing a rule that applied to nobody.
      # Use `allow` (unconditional) and also enable developer mode, so the
      # unprivileged probe below tests the permission itself rather than group
      # membership. Fine on a throwaway CI VM; not advice for a real machine.
      - name: Configure macOS taskport permissions
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          echo "1. Read"
          id $(whoami)
          sudo security authorizationdb read system.privilege.taskport
          sudo DevToolsSecurity -enable || true
          sudo dseditgroup -o edit -a "$(whoami)" -t user _developer || true

          echo "2. Write"
          sudo security authorizationdb write system.privilege.taskport allow

          echo "3. Check"
          sudo security authorizationdb read system.privilege.taskport

      # Ground truth about the macOS image, so a failure is diagnosable from the
      # log alone instead of costing a round-trip. Answers, in order: is it a fat
      # binary (which slices), does it carry the PyRuntime section and in which
      # segment, and how is the _PyRuntime symbol actually spelled.
      - name: Describe the macOS Python image
        if: runner.os == 'macOS'
        continue-on-error: true
        run: |
          PYBIN="$(python -c 'import sys; print(sys.executable)')"
          # The executable is a stub; the runtime lives in the framework dylib.
          FW="$(python -c 'import sysconfig,os; print(os.path.join(sysconfig.get_config_var("prefix"), "Python"))')"
          for f in "$PYBIN" "$FW"; do
            echo "===== $f ====="
            [ -e "$f" ] || { echo "(absent)"; continue; }
            file "$f"
            otool -l "$f" 2>/dev/null | grep -B2 -A4 'PyRuntime' || echo "(no PyRuntime section)"
            nm -m "$f" 2>/dev/null | grep -i 'pyruntime\|py_version' || echo "(no matching symbols)"
            # A `runtime` code-signing flag means hardened runtime, which refuses
            # task_for_pid to a non-root caller no matter what the authorization DB
            # says. That is the leading *hypothesis* for why unprivileged attach
            # worked on 3.13+ but not 3.8-3.12 — same runner, same caller, so the
            # variable is the target build. Unconfirmed until this output is read.
            codesign -dv --entitlements - "$f" 2>&1 | grep -i 'flags\|runtime\|get-task-allow' \
              || echo "(unsigned / no signing info)"
          done

      # The whole driver lives in tests/live_smoke.py, not in this step: the same
      # command has to run on Windows/PowerShell and macOS, and it must be
      # reproducible by hand off CI. Keep this step a single invocation.
      - name: Attach, detect version, assert non-empty GC stats
        if: runner.os != 'macOS'
        run: python tests/live_smoke.py --label ${{ matrix.os }}-py${{ matrix.python }}

      # Informational: can macOS attach WITHOUT root, now that taskport is granted
      # unconditionally above? Deliberately always exits 0 and reports through a
      # grep-able marker rather than the step's status — a `continue-on-error` step
      # reports `conclusion: success` when it fails, and reading that mask as a
      # result already produced one confident wrong conclusion (ADR 0004).
      # If UNPRIV-RESULT is PASS on every version, drop the sudo step below and run
      # macOS unprivileged like the other two platforms.
      - name: Unprivileged attach probe (macOS, informational)
        if: runner.os == 'macOS'
        run: |
          if python tests/live_smoke.py \
               --label ${{ matrix.os }}-py${{ matrix.python }}-unpriv; then
            echo "UNPRIV-RESULT: PASS (py${{ matrix.python }}) — sudo not required"
          else
            echo "UNPRIV-RESULT: FAIL (py${{ matrix.python }}) — sudo still required"
          fi

      # macOS runs under sudo because attaching there goes through task_for_pid,
      # and a Python built with a hardened runtime refuses it to a non-root caller
      # regardless of the taskport authorization above. Measured: unprivileged
      # passes on 3.13+ but fails on 3.8–3.12, while sudo passes on all eight — so
      # this is a property of how each Python build is signed, not of gcscope.
      # Root is simply the supported way to attach on macOS (same as py-spy).
      - name: Attach, detect version, assert non-empty GC stats (sudo)
        if: runner.os == 'macOS'
        run: |
          PY="$(command -v python)"
          sudo -E "$PY" tests/live_smoke.py \
            --label ${{ matrix.os }}-py${{ matrix.python }}
