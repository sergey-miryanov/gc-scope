name: Coverage report
description: >
  Optionally run an instrumented test command, convert the emitted profraw into
  lcov via grcov, and upload to Codecov. Non-blocking by design — wrap the `uses`
  call in `continue-on-error: true` at the call site (ADR 0005: the gate asserts
  against an uninstrumented binary, so a coverage-tool failure must not block it).

inputs:
  flags:
    description: Codecov flags for this report (e.g. "unit,ubuntu-latest").
    required: true
  name:
    description: Codecov upload name.
    required: true
  codecov-token:
    description: >
      CODECOV_TOKEN — passed explicitly because composite actions have no access
      to the `secrets` context.
    required: true
  test-cmd:
    description: >
      Instrumented test command to run before grcov. Leave empty when the profraw
      was already produced by earlier steps (e.g. the live-smoke runs).
    required: false
    default: ''

runs:
  using: composite
  steps:
    # RUSTFLAGS is step-scoped so only this instrumented run is affected; the gate
    # steps keep running an uninstrumented binary.
    - name: Run instrumented tests
      if: inputs.test-cmd != ''
      shell: bash
      env:
        RUSTFLAGS: -Cinstrument-coverage
        LLVM_PROFILE_FILE: ${{ github.workspace }}/target/profraw/gcscope-%p-%m.profraw
      run: ${{ inputs.test-cmd }}

    # grcov (not cargo-llvm-cov): `-s .` emits repo-relative paths so Windows uploads
    # merge with Linux/macOS instead of double-counting under absolute paths. The
    # --ignore globs drop registry/stdlib sources so only this crate's files land.
    - name: Generate lcov
      shell: bash
      run: |
        grcov target/profraw \
          --binary-path target/debug \
          -s . -t lcov --branch --ignore-not-existing \
          --ignore '../*' --ignore '/*' --ignore 'C:/Users/*' \
          -o lcov.info
        echo "lcov source files: $(grep -c '^SF:' lcov.info || echo 0)"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: lcov.info
        flags: ${{ inputs.flags }}
        name: ${{ inputs.name }}
        # Explicit path; searching the tree would also pick up stale local reports.
        disable_search: true
        fail_ci_if_error: false
        token: ${{ inputs.codecov-token }}
