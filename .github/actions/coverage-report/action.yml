name: Coverage report
description: >
  Produce an lcov report with cargo-llvm-cov and upload it to Codecov. With `test-cmd`
  set, this action instruments through cargo-llvm-cov's own target dir, runs the command,
  and reports; with `test-cmd` empty it uploads a `lcov.info` the caller already generated
  (the live-smoke matrix runs instrumented and reports before calling here). Wrap the
  `uses` call in `continue-on-error: true` at the call site so a coverage-service failure
  can't redden a correctness gate. Requires cargo-llvm-cov and the llvm-tools-preview
  component on the runner.

inputs:
  flags:
    description: Codecov flags for this report (e.g. "unit,ubuntu-latest").
    required: true
  name:
    description: Codecov upload name.
    required: true
  codecov-token:
    description: >
      CODECOV_TOKEN — passed explicitly because composite actions have no access
      to the `secrets` context.
    required: true
  test-cmd:
    description: >
      Command to instrument and run under cargo-llvm-cov (e.g. `cargo test --quiet`).
      Leave empty when the caller already produced lcov.info (the live-smoke matrix).
    required: false
    default: ''

runs:
  using: composite
  steps:
    # cargo-llvm-cov's show-env instruments through its own target dir, so `report` finds
    # the profiles and objects automatically — no path juggling, and Codecov normalizes the
    # absolute paths so the per-OS uploads merge. Sourced inline (not $GITHUB_ENV) so the
    # surrounding gate steps (clippy/fmt) keep building uninstrumented.
    - name: Generate lcov (cargo-llvm-cov)
      if: inputs.test-cmd != ''
      shell: bash
      run: |
        set -euo pipefail
        source <(cargo llvm-cov show-env --export-prefix)
        cargo llvm-cov clean --workspace
        ${{ inputs.test-cmd }}
        cargo llvm-cov report --lcov --output-path lcov.info
        echo "lcov source files: $(grep -c '^SF:' lcov.info || echo 0)"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: lcov.info
        flags: ${{ inputs.flags }}
        name: ${{ inputs.name }}
        disable_search: true
        fail_ci_if_error: true
        token: ${{ inputs.codecov-token }}
