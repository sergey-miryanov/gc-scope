# Coverage is informational here on purpose. This codebase's characteristic bug is a
# WRONG struct offset, which executes exactly the same lines as a right one — so no
# coverage percentage can detect it. The live-smoke matrix is the real gate.
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

ignore:
  # Generated by scripts/gen-offsets.py: ~5,600 lines, about 42% of the crate.
  # Including them makes the percentage a function of how many Python versions
  # happen to be registered rather than of how well the code is tested.
  - "src/remote_debugging/offsets/v_*.rs"
  # Interactive ratatui screens; nothing headless reaches them.
  - "src/diagram/tui_v2.rs"
  - "src/diagram/pid_dialog.rs"

flag_management:
  default_rules:
    # Carryforward is OFF by default, and a flag with no report on a commit scores its
    # files 0% rather than "unchanged". With `fail-fast: false` and 12 uploads across
    # two flags, one failed leg would otherwise read as a coverage collapse.
    carryforward: true
